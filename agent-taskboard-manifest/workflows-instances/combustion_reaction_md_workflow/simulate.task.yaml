id: "simulate_stage"
purpose: "Prepare DeePMD-enabled LAMMPS inputs and run staged reactive MD for the combustion system."
inputs:
  lammps_data_file: "Required. Initial system structure from the preparation stage."
  server_info: "Required. Execution environment details for dpdispatcher."
  deepmd_model_url: "Required. URL for the pretrained Deep Potential model. Default is the user-provided graph.pb link unless overridden."
outputs:
  deepmd_model: "Local model file path or verified blocking reason if unavailable."
  lammps_input_files: "LAMMPS input files for relaxation, heating, and production."
  md_parameter_summary: "Explicit summary of key MD parameters shown before production begins."
  thermo_output: "Thermodynamic output from the reactive MD run."
  trajectory_file: "Trajectory file for reaction-network analysis."
  simulation_summary: "Summary of simulation setup, job status, and artifact paths."
prerequisites:
  - spec: "A valid LAMMPS data file must exist from the preparation stage."
    how_to_check: "Check that the data file exists and is readable."
steps:
  - id: "prepare_md_inputs"
    action: "Execute sub-task `./simulate_prepare.task.yaml`."
    produces:
      md_inputs: "DeepMD model, LAMMPS input files, and parameter summary."
    when:
      - condition: "MD input preparation fails"
        evidence: "Model retrieval or LAMMPS input assembly fails."
        response: "FAIL"
        message: "Reactive MD cannot start without the model and valid input files."

  - id: "run_md_jobs"
    action: "Execute sub-task `./simulate_run.task.yaml`."
    produces:
      md_outputs: "Reactive MD job records, logs, thermo data, and trajectory."
    when:
      - condition: "Reactive MD fails"
        evidence: "Submission fails, runtime aborts, or required outputs are unusable."
        response: "FAIL"
        message: "Analysis depends on the completed MD trajectory."
      - condition: "Reactive MD completes"
        evidence: "Trajectory and thermodynamic outputs are available."
        response: "SUCCESS"
        message: "Simulation stage is complete."
