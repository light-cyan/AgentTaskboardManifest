id: "prepare_initial_coordinates"
purpose: "Generate preliminary Gaussian input files with atom coordinates for the fuel and O2."
inputs:
  fuel_smiles: "Required. Validated SMILES for the fuel species."
  oxygen_smiles: "Required. Validated SMILES for O2."
outputs:
  fuel_initial_gjf: "Preliminary Gaussian input file with coordinates for the fuel species."
  oxygen_initial_gjf: "Preliminary Gaussian input file with coordinates for O2."
prerequisites:
  - spec: "Open Babel or equivalent coordinate-generation capability must be available."
    how_to_check: "Run the configured Open Babel command or verify the tool can generate 3D coordinates from SMILES."
steps:
  - id: "generate_fuel_coordinates"
    action: "Use Open Babel to generate a preliminary .gjf file with 3D coordinates for the fuel species from the validated SMILES."
    checks:
      fuel_coordinate_file_ok:
        method: "Read the generated fuel .gjf file."
        guard: "The file exists and contains a molecular coordinate block."
    when:
      - condition: "Fuel coordinate generation fails"
        evidence: "Open Babel errors or the generated file lacks usable coordinates."
        response: "FAIL"
        message: "Geometry optimization cannot proceed for the fuel species."

  - id: "generate_oxygen_coordinates"
    action: "Use Open Babel to generate a preliminary .gjf file with 3D coordinates for O2 from the validated SMILES."
    checks:
      oxygen_coordinate_file_ok:
        method: "Read the generated O2 .gjf file."
        guard: "The file exists and contains a molecular coordinate block."
    when:
      - condition: "O2 coordinate generation fails"
        evidence: "Open Babel errors or the generated file lacks usable coordinates."
        response: "FAIL"
        message: "Geometry optimization cannot proceed for O2."
      - condition: "Both coordinate files are ready"
        evidence: "Fuel and O2 preliminary .gjf files both contain usable coordinates."
        response: "SUCCESS"
        message: "Initial coordinate generation is complete."
