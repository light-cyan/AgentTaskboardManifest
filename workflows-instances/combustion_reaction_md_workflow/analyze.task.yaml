id: "analyze_stage"
purpose: "Run ReacNetGenerator on the reactive MD trajectory and summarize species evolution plus major oxidation pathways without extra sub-task indirection."
inputs:
  trajectory_file: "Required. Trajectory from the simulation stage."
  lammps_data_file: "Optional but recommended. Initial structure or data file for atom-type interpretation if needed."
  server_info: "Required when analysis must be submitted through dpdispatcher due to cost or environment constraints."
outputs:
  reacnet_report: "Reaction-network output files and report directory."
  pathway_summary: "Summary of CH4, O2, radical intermediates, oxidation products, and major reaction pathways."
  analysis_summary: "Summary of analysis status and artifact paths."
prerequisites:
  - spec: "A usable trajectory must exist from the simulation stage."
    how_to_check: "Check that the trajectory file exists and is non-empty."
  - spec: "ReacNetGenerator must be available and the trajectory format must be readable or convertible."
    how_to_check: "Verify the trajectory can be accepted directly or after documented conversion."
steps:
  - id: "run_reacnet_analysis"
    action: "Run ReacNetGenerator on the reactive MD trajectory, using additional structure metadata when helpful. Use dpdispatcher if the analysis is long-running or environment-constrained. Generate species-evolution outputs and a reaction-network report."
    checks:
      analysis_outputs_ok:
        method: "Inspect the output directory for generated report files and species/network results."
        guard: "A usable report exists and covers species evolution through the combustion trajectory."
    when:
      - condition: "ReacNetGenerator execution fails"
        evidence: "Command errors, unsupported trajectory format, or no usable report is produced."
        response: "FAIL"
        message: "The requested post-processing result is unavailable even if the MD trajectory exists."

  - id: "summarize_pathways"
    action: "Summarize the evolution of CH4, O2, radical intermediates, and oxidation products, and extract the major methane-oxidation pathways and key intermediates from the generated report."
    when:
      - condition: "Pathway summary is complete"
        evidence: "A concise summary is extracted from the ReacNetGenerator outputs."
        response: "SUCCESS"
        message: "Analysis stage is complete."
