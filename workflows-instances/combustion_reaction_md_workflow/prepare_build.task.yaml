id: "prepare_build"
purpose: "Construct the initial combustion mixture and convert it into a LAMMPS-readable structure file."
inputs:
  fuel_xyz: "Required. Optimized xyz file for the fuel species."
  oxygen_xyz: "Required. Optimized xyz file for O2."
  fuel_count: "Required. Number of fuel molecules."
  target_density: "Required. Packing density in g/cm^3."
  oxidizer_rule: "Required. Rule for determining the corresponding O2 amount."
outputs:
  oxygen_count: "Resolved number of O2 molecules used in the mixture."
  packed_xyz: "Packed initial mixture structure."
  lammps_data_file: "LAMMPS-readable data file such as CH4_O2_init.data."
  box_metadata: "Summary of box size, density, and composition."
prerequisites:
  - spec: "Packmol and dpdata conversion for LAMMPS data generation must be available."
    how_to_check: "Verify Packmol can run and the resulting packed structure can be converted to a LAMMPS data file."
steps:
  - id: "resolve_oxygen_count"
    action: "Determine the corresponding O2 molecule count from the user-agreed oxidizer rule. If the rule is ambiguous, ask the user for clarification before packing."
    when:
      - condition: "O2 count cannot be determined unambiguously"
        evidence: "The oxidizer rule is missing, contradictory, or insufficient for a unique composition."
        response: "raise(clarification required)"
        message: "Ask the user to clarify how the corresponding O2 amount should be chosen."

  - id: "pack_system"
    action: "Use Packmol to build a mixture containing the requested number of fuel molecules and the resolved number of O2 molecules at the target density."
    checks:
      packed_system_ok:
        method: "Inspect Packmol output for successful packing and requested composition."
        guard: "The packed structure exists and matches the requested molecule counts."
    when:
      - condition: "Packing fails"
        evidence: "Packmol does not converge or the packed output is invalid."
        response: "FAIL"
        message: "Reactive MD cannot proceed without a valid packed initial system."

  - id: "convert_to_lammps_data"
    action: "Use dpdata to convert the packed structure into a LAMMPS-readable data file, for example CH4_O2_init.data."
    checks:
      lammps_data_ok:
        method: "Inspect the generated data file for existence and readability."
        guard: "The LAMMPS data file exists and is suitable for downstream MD setup."
    when:
      - condition: "LAMMPS data conversion fails"
        evidence: "dpdata conversion errors or the generated data file is invalid."
        response: "FAIL"
        message: "Simulation depends on a valid LAMMPS-readable initial structure."
      - condition: "Packing and conversion both succeed"
        evidence: "Packed xyz, LAMMPS data file, and box metadata are all available."
        response: "SUCCESS"
        message: "Initial system construction is complete."
