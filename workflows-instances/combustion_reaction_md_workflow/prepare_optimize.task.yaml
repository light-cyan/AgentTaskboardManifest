id: "prepare_optimize"
purpose: "Assemble optimization-ready Gaussian inputs and submit geometry optimizations for the fuel and O2."
inputs:
  fuel_initial_gjf: "Required. Preliminary Gaussian input with coordinates for the fuel species."
  oxygen_initial_gjf: "Required. Preliminary Gaussian input with coordinates for O2."
  server_info: "Required. Execution environment details for dpdispatcher submission."
outputs:
  fuel_opt_gjf: "Optimization-ready Gaussian input for the fuel species."
  oxygen_opt_gjf: "Optimization-ready Gaussian input for O2."
  fuel_log: "Gaussian optimization log for the fuel species."
  oxygen_log: "Gaussian optimization log for O2."
  fuel_fchk: "Formatted checkpoint for the fuel species when available."
  oxygen_fchk: "Formatted checkpoint for O2 when available."
  gaussian_job_records: "Submission metadata and job status for the optimization jobs."
prerequisites:
  - spec: "gjf-flux, Gaussian execution conventions, and dpdispatcher submission path must be available."
    how_to_check: "Verify the agent can assemble .gjf files and submit Gaussian jobs following the configured environment."
steps:
  - id: "assemble_optimization_inputs"
    action: "Use gjf-flux to transform the preliminary fuel and O2 .gjf files into optimization-ready Gaussian inputs at the B3LYP/6-31G(d,p) level, with outputs configured to preserve .log and produce .fchk when available."
    checks:
      opt_inputs_ok:
        method: "Read the generated optimization .gjf files."
        guard: "Both files contain coordinates, an optimization route at B3LYP/6-31G(d,p), and settings consistent with retaining downstream outputs."
    when:
      - condition: "Optimization input assembly fails"
        evidence: "gjf-flux fails or the generated files do not satisfy route and output requirements."
        response: "FAIL"
        message: "Gaussian optimization cannot be submitted without valid input files."

  - id: "submit_optimization_jobs"
    action: "Submit the fuel and O2 optimization jobs through dpdispatcher using the run-gauss conventions, then monitor for completion."
    checks:
      gaussian_ok:
        method: "Inspect final sections of the Gaussian logs and confirm required output files exist."
        guard: "Both jobs submit successfully, terminate normally, and produce usable optimized outputs."
    when:
      - condition: "Submission fails or Gaussian ends abnormally"
        evidence: "dpdispatcher or scheduler returns unrecoverable errors, or logs lack normal termination."
        response: "FAIL"
        message: "Optimized structures are unavailable, so downstream parsing and system construction are blocked."
      - condition: "Optimization jobs finish successfully"
        evidence: "Normal termination and usable logs are present for both species."
        response: "SUCCESS"
        message: "Optimization stage is complete."
